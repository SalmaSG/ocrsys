{% extends "rentals/base.html" %}
{% block content %}
<section class="auth-shell">
  <form method="post" class="form-card">
    {% csrf_token %}
    <h1>Secure Login</h1>
    {{ form.as_p }}
    <button type="submit">Login</button>
    <p class="muted">New user? <a href="{% url 'register' %}">Create an account</a></p>
  </form>
</section>
{% endblock %}
